services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: edu-lab-web-api:local
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
    env_file:
      - .env
    volumes:
      - storage:/var/www/html/storage
      - public-assets:/var/www/html/public
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - public-assets:/var/www/html/public:ro
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: edu-lab-web-api:local
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3
    env_file:
      - .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: edu-lab-web-api:local
    restart: unless-stopped
    entrypoint: ["sh", "-c", "while true; do php artisan schedule:run; sleep 60; done"]
    env_file:
      - .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-xo_edu_lab}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  storage:
  public-assets:
